<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Instagram Scraper</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    
    <h1>Instagram Scraper</h1>
    <p class="subtitle">Visualiza las publicaciones de cualquier perfil público</p>

    <div class="search-box">
      <div class="input-wrap">
        <span class="at-sign">@</span>
        <input type="text" id="username" placeholder="usuario" />
      </div>
      <select id="numPosts">
        <option value="5">5 posts</option>
        <option value="10" selected>10 posts</option>
        <option value="15">15 posts</option>
        <option value="20">20 posts</option>
      </select>
      <button id="btnSearch" onclick="buscar()">Buscar</button>
    </div>

    <p class="error" id="error"></p>

    <div class="spinner-wrap" id="spinner">
      <div class="spinner"></div>
    </div>

    <div id="results">
      <hr class="divider" />
      <div class="profile-card" id="profileCard"></div>
      <p class="section-label">Publicaciones</p>
      <div class="grid" id="grid"></div>
    </div>

  </div>

  <script>
    const API = "http://localhost:8000";

    function fmt(n) {
      if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + "M";
      if (n >= 1_000)     return (n / 1_000).toFixed(1) + "K";
      return n.toLocaleString();
    }

    async function buscar() {
      const username = document.getElementById("username").value.trim().replace(/^@/, "");
      if (!username) return;

      document.getElementById("error").style.display   = "none";
      document.getElementById("results").style.display = "none";
      document.getElementById("spinner").style.display = "block";
      document.getElementById("btnSearch").disabled    = true;

      try {
        const numPosts = document.getElementById("numPosts").value;
        const res      = await fetch(`${API}/scrape/${username}?num_posts=${numPosts}`);
        const data     = await res.json();
        if (!res.ok) throw new Error(data.detail || `Error ${res.status}`);

        renderPerfil(data);
        renderPosts(data.posts);
        document.getElementById("results").style.display = "block";

      } catch (err) {
        const el = document.getElementById("error");
        el.textContent = "⚠ " + (err.message || "No se pudo conectar al servidor.");
        el.style.display = "block";
      } finally {
        document.getElementById("spinner").style.display = "none";
        document.getElementById("btnSearch").disabled    = false;
      }
    }

    function renderPerfil(data) {
      document.getElementById("profileCard").innerHTML = `
        <img class="profile-pic" src="${data.profile_pic}" alt="${data.username}"
             onerror="this.style.display='none'" />
        <div>
          <p class="profile-username">@${data.username}</p>
          <p class="profile-fullname">${data.full_name}</p>
          ${data.bio ? `<p class="profile-bio">${data.bio}</p>` : ""}
          <div class="stats">
            <div><span class="stat-val">${fmt(data.followers)}</span><span class="stat-lbl">seguidores</span></div>
            <div><span class="stat-val">${fmt(data.following)}</span><span class="stat-lbl">siguiendo</span></div>
          </div>
        </div>
      `;
    }

    function renderPosts(posts) {
      document.getElementById("grid").innerHTML = posts.map(p => `
        <a class="post-card" href="${p.url}" target="_blank" rel="noopener">
          <div class="img-wrap">
            ${p.imagen_url
              ? `<img src="${p.imagen_url}" alt="post" loading="lazy" onerror="this.outerHTML='<div class=&quot;img-fallback&quot;>◻</div>'" />`
              : `<div class="img-fallback">◻</div>`}
            <div class="overlay">
              <div class="overlay-stats">
                <span>♥ ${fmt(p.likes)}</span>
                <span>💬 ${fmt(p.comentarios)}</span>
              </div>
            </div>
          </div>
          <div class="post-meta">
            <p class="post-date">${p.fecha}</p>
            ${p.caption ? `<p class="post-caption">${p.caption.slice(0, 80)}${p.caption.length > 80 ? "…" : ""}</p>` : ""}
          </div>
        </a>
      `).join("");
    }

    document.getElementById("username").addEventListener("keydown", e => {
      if (e.key === "Enter") buscar();
    });
  </script>
</body>
</html>
